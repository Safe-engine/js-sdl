<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS SDL Web</title>
    <style>
      :root {
        color-scheme: dark;
        background: #090f1d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        background: #090f1d;
      }

      #sdl-canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: 100%;
        background: #090f1d;
      }
    </style>
  </head>
  <body>
    <canvas id="sdl-canvas"></canvas>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
